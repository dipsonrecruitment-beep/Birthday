<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Invitation</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
font-family:Arial,sans-serif;
}

.container{
position:relative;
width:100%;
max-width:500px;
}

.invitation{
width:100%;
display:block;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* Location Button */

.location-btn{

position:absolute;

left:50%;

bottom:110px;

transform:translateX(-50%);

background:#FFD700;

color:#000;

text-decoration:none;

padding:12px 30px;

border-radius:40px;

font-size:18px;

font-weight:bold;

transition:.3s;

box-shadow:0 5px 15px rgba(0,0,0,.4);

}

.location-btn:hover{

background:#ffb700;

transform:translateX(-50%) scale(1.05);

}

</style>

</head>

<body>

<div class="container">

<img src="birthday.jpg" class="invitation">


</body>
</html>
